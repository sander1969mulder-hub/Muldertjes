<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#FDF6EC;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:#FDF6EC;position:relative}

.member-row{background:#F8F5FF;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.icon-btn{background:rgba(108,63,197,.09);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px}

.msg-admin-row{background:#F8F5FF;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.event-admin-row{background:#F8F5FF;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.news-admin-row{background:#F8F5FF;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.avatar-picker{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.avatar-opt{font-size:20px;background:transparent;border:2px solid transparent;border-radius:8px;padding:2px;cursor:pointer}
.avatar-opt.sel{background:rgba(39,174,96,.13);border-color:#27AE60}
.color-picker{display:flex;gap:6px;margin-bottom:10px}
.color-opt{width:24px;height:24px;border-radius:50%;border:3px solid transparent;cursor:pointer}

.add-member-box{background:#F0FBF4;border-radius:14px;padding:14px;border:2px dashed rgba(39,174,96,.33)}
.news-input-row{display:flex;gap:8px;margin-top:12px}
.news-input{flex:1;padding:10px 13px;border-radius:11px;border:1.5px solid #E8F6FB;font-size:14px;font-family:Georgia,serif;background:#E8F6FB;outline:none;color:#333}
.badge{background:#2E9EC4;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-family:sans-serif}
</style>
</head><body>

</div><script>
const AVATARS=["👨‍✈️","👩","👧","👱‍♀️","🧔","👴","👵","👨","👩‍🦱","👦","👶","🧑"];

const DAYS=["zo","ma","di","wo","do","vr","za"];
const MONTHS=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
let state={familyName:"de Muldertjes",members:[{id:1,name:"Sander",role:"Pa",avatar:"👨‍✈️",color:"#1A6B8A"},{id:2,name:"Frieda",role:"Ma",avatar:"👩",color:"#F47C48"},{id:3,name:"Julia",role:"Dochter",avatar:"👧",color:"#F5A623"},{id:4,name:"Sophie",role:"Dochter",avatar:"👱‍♀️",color:"#2E9EC4"},{id:5,name:"Nic",role:"Schoonzoon",avatar:"🧔",color:"#5BB8D4"}],messages:[{id:1,from:1,text:"Wie heeft er zin in een boottochtje dit weekend? ⛵",time:"09:14"},{id:2,from:2,text:"Ik doe mee! En ik maak een picknick klaar ☀️🧺",time:"09:17"},{id:3,from:3,text:"JAAA! Ik ga zwemmen!! 🏊‍♀️",time:"09:18"},{id:4,from:5,text:"Sophie en ik zijn er ook bij 🙌",time:"09:21"},{id:5,from:4,text:"Top! Dan zaterdagochtend vroeg vertrekken 🌅",time:"09:23"}],events:[{id:1,title:"Boottochtje met z'n allen ⛵",date:"za 5 apr",time:"09:00",color:"#1A6B8A",who:"Iedereen"},{id:2,title:"Verjaardag Opa Mulders 🎂",date:"zo 6 apr",time:"15:00",color:"#F5A623",who:"Iedereen"},{id:3,title:"Julia's zwemwedstrijd 🏊",date:"za 12 apr",time:"10:30",color:"#2E9EC4",who:"👧👨‍✈️👩"},{id:4,title:"Diner bij Sophie & Nic 🍽️",date:"vr 18 apr",time:"18:00",color:"#F47C48",who:"👨‍✈️👩"}],news:["💍 Sophie & Nic zijn 6 maanden getrouwd, proficiat!","🏊‍♀️ Julia heeft haar zwemdiploma A gehaald!","⛵ Pa heeft de boot klaar voor het nieuwe seizoen!","🌺 Frieda's tuin bloeit prachtig dit jaar!"],locations:{}};
let currentTab="chat",currentAdminTab="familie",mapInstance=null,mapMarkers=[],watchId=null,myLocShared=false,locInput="",newMember={name:"",role:"",avatar:"👤",color:"#1A6B8A"},newEvent={title:"",date:"",time:"",who:""},showEventForm=false,newNews="";
const nid=arr=>Math.max(0,...arr.map(x=>x.id))+1;
const fmtDate=d=>{if(!d)return"Binnenkort";try{const dt=new Date(d+"T12:00:00");return`${DAYS[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;}catch{return d;}};
const fmtTime=t=>t||"–:–";
const now=()=>new Date().toLocaleTimeString("nl",{hour:"2-digit",minute:"2-digit"});
const me=()=>state.members[0];
function renderHeader(){document.getElementById("header-title").textContent=state.familyName+" ⛵";document.getElementById("header-count").textContent=state.members.length+" leden";document.getElementById("splash-title").textContent=state.familyName;const sa=document.getElementById("splash-avatars");sa.innerHTML=state.members.map(m=>`<span style="font-size:24px;animation:sh ${1.4+m.id*.2}s infinite">${m.avatar}</span>`).join("");const ha=document.getElementById("header-avatars");ha.innerHTML=state.members.map(m=>`<div class="member-avatar-item"><div class="member-avatar-circle" style="background:${m.color}">${m.avatar}</div><div class="member-avatar-name">${m.name}</div></div>`).join("");}
function setTab(tab){currentTab=tab;document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));document.getElementById("tab-"+tab).classList.add("active");renderContent();}
function renderContent(){const el=document.getElementById("content");if(currentTab==="chat")el.innerHTML=renderChat();if(currentTab==="agenda")el.innerHTML=renderAgenda();if(currentTab==="locatie")el.innerHTML=renderLocatie();if(currentTab==="fotos")el.innerHTML=renderFotos();if(currentTab==="chat")setupChat();if(currentTab==="agenda")setupAgenda();if(currentTab==="locatie")setupLocatie();}
function renderChat(){const msgs=state.messages.map(m=>{const s=state.members.find(x=>x.id===m.from);const isMe=m.from===1;return`<div class="msg-row ${isMe?"me":""}">${!isMe?`<div class="msg-avatar" style="background:${s?.color||"#ccc"}">${s?.avatar||"?"}</div>`:""}<div class="msg-bubble-wrap">${!isMe?`<div class="msg-sender" style="color:${s?.color}">${s?.name}</div>`:""}<div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time}</div></div></div>`;}).join("");return`<div id="chat-wrap"><div id="chat-header"><span style="font-size:18px">⛵</span><span style="font-size:13px;color:#1A6B8A;font-family:sans-serif;font-weight:700">Groepschat ${state.familyName}</span><span style="margin-left:auto" class="badge">${state.members.length} leden</span></div><div id="chat-messages">${msgs}<div id="chat-end"></div></div><div id="chat-input-wrap"><input id="chat-input" placeholder="Bericht als ${me().name}..."/><button id="chat-send" onclick="sendMsg()">➤</button></div></div>`;}
function setupChat(){document.getElementById("chat-end")?.scrollIntoView();document.getElementById("chat-input")?.addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg();});}
function sendMsg(){const inp=document.getElementById("chat-input");const txt=inp?.value?.trim();if(!txt)return;state.messages.push({id:Date.now(),from:1,text:txt,time:now()});inp.value="";renderContent();}
function renderAgenda(){const formHtml=showEventForm?`<div class="new-event-form"><div style="font-size:14px;font-weight:bold;color:#1A6B8A;font-family:sans-serif;margin-bottom:14px">⚓ Nieuwe activiteit</div><input class="field" id="ev-title" placeholder="📌 Naam activiteit" value="${newEvent.title}"/><div class="field-label">📅 Kies een datum</div><input class="field" id="ev-date" type="date" value="${newEvent.date}"/><div class="field-label">🕐 Kies een tijd</div><input class="field" id="ev-time" type="time" value="${newEvent.time}"/><div style="display:flex;gap:8px;margin-top:4px"><button onclick="addEvent()" class="btn-primary">Toevoegen ✓</button><button class="btn-cancel" onclick="toggleEventForm()">Annuleren</button></div></div>`:"";const evHtml=state.events.length===0?`<div style="text-align:center;padding:30px;color:#ccc;font-family:sans-serif;font-size:14px">Nog geen activiteiten.<br>Druk op "+ Nieuw".</div>`:state.events.map(ev=>{const parts=ev.date.split(" ");return`<div class="event-card" style="border-left:4px solid ${ev.color}"><div class="event-date-box" style="background:${ev.color}18"><div class="event-day" style="color:${ev.color}">${parts[0]||""}</div><div class="event-datenum" style="color:${ev.color}">${parts.slice(1).join(" ")||ev.date}</div></div><div class="event-info"><div class="event-title">${ev.title}</div><div class="event-meta">🕐 ${ev.time} · ${ev.who}</div></div></div>`;}).join("");return`<div class="agenda-wrap"><div class="agenda-header"><div><h2 style="font-size:20px;color:#5BB8D4">Onze agenda</h2><div style="font-size:12px;color:#bbb;font-family:sans-serif;margin-top:2px">April 2026</div></div><button class="btn-primary" onclick="toggleEventForm()">+ Nieuw</button></div>${formHtml}${evHtml}</div>`;}
function setupAgenda(){document.getElementById("ev-title")?.addEventListener("input",e=>newEvent.title=e.target.value);document.getElementById("ev-date")?.addEventListener("change",e=>newEvent.date=e.target.value);document.getElementById("ev-time")?.addEventListener("change",e=>newEvent.time=e.target.value);}
function toggleEventForm(){showEventForm=!showEventForm;renderContent();}
function addEvent(){if(!newEvent.title)return;state.events.push({id:Date.now(),title:newEvent.title,date:fmtDate(newEvent.date),time:fmtTime(newEvent.time),who:"Iedereen",color:"#1A6B8A"});newEvent={title:"",date:"",time:"",who:""};showEventForm=false;renderContent();}
</script><script>
function renderLocatie(){const myLoc=state.locations[1];const sharedCount=Object.keys(state.locations).length;const inputCard=!myLocShared?`<div class="loc-input-card"><div style="font-size:30px;margin-bottom:8px">📍</div><div style="font-weight:bold;font-size:16px;margin-bottom:6px">Waar ben jij, ${me().name}?</div><div style="font-size:13px;color:rgba(255,255,255,.8);font-family:sans-serif;line-height:1.5">Typ een adres of stad — wereldwijd.</div><div class="loc-input-row"><input id="loc-input" placeholder="bv. Kerkstraat 1 Amsterdam..." value="${locInput}"/><button id="loc-btn" onclick="shareLocation()">✓</button></div><div style="margin-top:10px"><button onclick="useGPS()" style="background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.5);border-radius:12px;padding:8px 16px;font-family:sans-serif;font-size:13px;cursor:pointer">📡 Gebruik GPS</button></div><div id="loc-error" class="loc-error"></div></div>`:`<div class="loc-active-card"><div class="loc-dot"></div><div style="flex:1"><div style="font-weight:bold;font-size:13px;color:#27AE60;font-family:sans-serif">${me().avatar} ${me().name} — 📍 ${myLoc?.place||""}</div><div style="font-size:11px;color:#aaa;font-family:sans-serif;margin-top:1px">Gedeeld om ${myLoc?.updated||""}</div></div><button onclick="stopLocation()" style="background:#FFE5E5;color:#E74C3C;border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:700">Stop</button></div>`;const mapSection=sharedCount===0?`<div class="map-placeholder"><div class="globe">🗺️</div><div style="font-size:12px;color:#fff;font-family:sans-serif;margin-top:8px;font-weight:600">Nog niemand gedeeld</div></div>`:`<div id="map"></div>`;const membersList=state.members.map(m=>{const loc=state.locations[m.id];return`<div class="member-loc-card"><div class="member-loc-avatar"><div class="circle" style="background:${m.color}">${m.avatar}</div><div class="status-dot" style="background:${loc?"#27AE60":"#ccc"}"></div></div><div style="flex:1"><div style="font-weight:bold;font-size:15px;color:#333">${m.name}</div><div style="font-size:12px;font-family:sans-serif;margin-top:2px;color:${loc?"#27AE60":"#bbb"}">${loc?`📍 ${loc.place} · ${loc.updated}`:"Locatie niet gedeeld"}</div></div>${loc?`<div class="live-badge">Live</div>`:""}</div>`;}).join("");return`<div class="locatie-wrap"><h2 style="font-size:20px;color:#5BB8D4;margin-bottom:2px">Waar is iedereen?</h2><p style="font-size:13px;color:#aaa;margin-bottom:16px;font-family:sans-serif">Realtime locaties</p>${inputCard}<div class="map-wrap">${mapSection}</div>${membersList}</div>`;}
function setupLocatie(){document.getElementById("loc-input")?.addEventListener("input",e=>locInput=e.target.value);document.getElementById("loc-input")?.addEventListener("keydown",e=>{if(e.key==="Enter")shareLocation();});if(Object.keys(state.locations).length>0)setTimeout(initMap,100);}
function shareLocation(){const val=(document.getElementById("loc-input")?.value||locInput).trim();if(!val){showLocError("Typ eerst een adres in.");return;}locInput=val;const btn=document.getElementById("loc-btn");if(btn){btn.textContent="⏳";btn.disabled=true;}fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=1&accept-language=nl`).then(r=>r.json()).then(data=>{if(data&&data.length>0){const{lat,lon}=data[0];state.locations[1]={place:val,coords:{lat:parseFloat(lat),lng:parseFloat(lon)},updated:now()};myLocShared=true;locInput="";renderContent();}else{showLocError("Adres niet gevonden. Probeer anders.");if(btn){btn.textContent="✓";btn.disabled=false;}}}).catch(()=>{showLocError("Verbindingsfout. Controleer je internet.");if(btn){btn.textContent="✓";btn.disabled=false;}});}
function showLocError(msg){const el=document.getElementById("loc-error");if(el)el.textContent=msg;}
function stopLocation(){if(watchId)navigator.geolocation.clearWatch(watchId);delete state.locations[1];myLocShared=false;locInput="";renderContent();}
function initMap(){if(!document.getElementById("map"))return;if(mapInstance){mapInstance.remove();mapInstance=null;}const L=window.L;mapInstance=L.map("map").setView([52.3,5.3],7);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(mapInstance);const shared=state.members.filter(m=>state.locations[m.id]?.coords);const bounds=[];shared.forEach(m=>{const loc=state.locations[m.id];const icon=L.divIcon({html:`<div style="background:${m.color};width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)">${m.avatar}</div>`,className:"",iconSize:[38,38],iconAnchor:[19,19]});L.marker([loc.coords.lat,loc.coords.lng],{icon}).addTo(mapInstance).bindPopup(`<b>${m.name}</b><br>📍 ${loc.place}`);bounds.push([loc.coords.lat,loc.coords.lng]);});if(bounds.length===1)mapInstance.setView(bounds[0],14);else if(bounds.length>1)mapInstance.fitBounds(bounds,{padding:[40,40]});setTimeout(()=>mapInstance?.invalidateSize(),200);}
function useGPS(){if(!navigator.geolocation){alert("GPS niet beschikbaar.");return;}navigator.geolocation.getCurrentPosition(pos=>{const{latitude:lat,longitude:lng}=pos.coords;fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=nl`).then(r=>r.json()).then(d=>{const place=d.display_name?.split(",").slice(0,2).join(", ")||`${lat.toFixed(4)}, ${lng.toFixed(4)}`;state.locations[1]={place,coords:{lat,lng},updated:now()};myLocShared=true;locInput="";renderContent();}).catch(()=>{const place=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;state.locations[1]={place,coords:{lat,lng},updated:now()};myLocShared=true;renderContent();});},()=>alert("GPS geweigerd. Gebruik het tekstveld."),{enableHighAccuracy:true});}
function renderFotos(){const albums=[{e:"⛵",t:"Zeilweekend Friesland",d:"Jul 2024",n:42},{e:"🌅",t:"Vakantie Zeeland",d:"Aug 2024",n:38},{e:"💍",t:"Bruiloft Sophie & Nic",d:"Sep 2024",n:124},{e:"🎄",t:"Kerst bij Pa & Ma",d:"Dec 2024",n:29}];return`<div class="fotos-wrap"><h2 style="font-size:20px;color:#5BB8D4;margin-bottom:2px">Onze Herinneringen</h2><p style="font-size:13px;color:#bbb;margin-bottom:20px;font-family:sans-serif">De mooiste momenten 🌊</p><div class="fotos-grid">${albums.map(a=>`<div class="foto-card"><div class="foto-thumb">${a.e}</div><div class="foto-info"><div class="foto-title">${a.t}</div><div class="foto-meta">${a.d} · ${a.n} foto's</div></div></div>`).join("")}<div class="foto-add"><div style="font-size:30px">➕</div><div style="font-size:11px;color:#1A6B8A;font-family:sans-serif;margin-top:6px;font-weight:700">Album toevoegen</div></div></div><div class="news-card"><div style="font-size:15px;font-weight:bold;margin-bottom:10px">📢 Familie Nieuws</div><div style="font-size:13px;color:rgba(255,255,255,.78);font-family:sans-serif;line-height:1.85">${state.news.map(n=>`${n}<br>`).join("")}</div></div></div>`;}
function openAdmin(){document.getElementById("admin-modal").style.display="flex";renderAdminBody();}
function closeAdmin(){document.getElementById("admin-modal").style.display="none";renderContent();}
function setAdminTab(tab){currentAdminTab=tab;document.querySelectorAll(".admin-tab").forEach(b=>b.classList.remove("active"));document.getElementById("atab-"+tab).classList.add("active");renderAdminBody();}
function renderAdminBody(){const el=document.getElementById("admin-body");if(currentAdminTab==="familie")el.innerHTML=renderAdminFamilie();if(currentAdminTab==="berichten")el.innerHTML=renderAdminBerichten();if(currentAdminTab==="agenda")el.innerHTML=renderAdminAgenda();if(currentAdminTab==="nieuws")el.innerHTML=renderAdminNieuws();}
function renderAdminFamilie(){return`<div style="font-weight:bold;color:#6C3FC5;margin-bottom:10px;font-family:sans-serif">🏡 Familienaam</div><input class="field" id="a-fname" value="${state.familyName}" oninput="state.familyName=this.value;renderHeader()"/><div style="font-weight:bold;color:#6C3FC5;margin-bottom:10px;font-family:sans-serif;margin-top:6px">👥 Leden</div>${state.members.map(m=>`<div class="member-row"><div style="width:38px;height:38px;border-radius:50%;background:${m.color};display:flex;align-items:center;justify-content:center;font-size:20px">${m.avatar}</div><div style="flex:1"><div style="font-weight:bold;font-size:14px">${m.name}</div><div style="font-size:12px;color:#aaa;font-family:sans-serif">${m.role}</div></div><button class="icon-btn" onclick="editMember(${m.id})">✏️</button>${m.id!==1?`<button class="icon-btn del" onclick="deleteMember(${m.id})">🗑️</button>`:""}</div>`).join("")}<div class="add-member-box"><div style="font-size:13px;font-weight:bold;color:#27AE60;font-family:sans-serif;margin-bottom:10px">➕ Nieuw lid</div><div style="display:flex;gap:8px"><input class="field" id="nm-name" placeholder="Naam" style="margin-bottom:8px" value="${newMember.name}"/><input class="field" id="nm-role" placeholder="Rol" style="margin-bottom:8px" value="${newMember.role}"/></div><div style="font-size:11px;color:#aaa;font-family:sans-serif;margin-bottom:4px">Avatar:</div><div class="avatar-picker">${AVATARS.map(a=>`<button class="avatar-opt ${newMember.avatar===a?"sel":""}" onclick="setNMAvatar('${a}')">${a}</button>`).join("")}</div><div class="color-picker">${PALETTE.map(c=>`<button class="color-opt ${newMember.color===c?"sel":""}" style="background:${c}" onclick="setNMColor('${c}')"></button>`).join("")}</div><button class="btn-green" onclick="addMember()">Lid toevoegen</button></div>`;}
function editMember(id){const m=state.members.find(x=>x.id===id);const n=prompt("Naam:",m.name);const r=prompt("Rol:",m.role);if(n){m.name=n;m.role=r||m.role;renderAdminBody();renderHeader();}}
function deleteMember(id){state.members=state.members.filter(x=>x.id!==id);renderAdminBody();renderHeader();}
function setNMAvatar(a){newMember.avatar=a;renderAdminBody();}
function setNMColor(c){newMember.color=c;renderAdminBody();}
function addMember(){const n=document.getElementById("nm-name")?.value?.trim();const r=document.getElementById("nm-role")?.value?.trim();if(!n)return;state.members.push({id:nid(state.members),name:n,role:r||"",avatar:newMember.avatar,color:newMember.color});newMember={name:"",role:"",avatar:"👤",color:"#1A6B8A"};renderAdminBody();renderHeader();}
function renderAdminBerichten(){if(state.messages.length===0)return`<div style="text-align:center;color:#ccc;padding:20px;font-family:sans-serif">Geen berichten</div>`;return`${state.messages.map(m=>{const s=state.members.find(x=>x.id===m.from);return`<div class="msg-admin-row"><div style="width:32px;height:32px;border-radius:50%;background:${s?.color||"#ccc"};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${s?.avatar||"?"}</div><div style="flex:1"><div style="font-size:12px;font-weight:bold;color:${s?.color};font-family:sans-serif">${s?.name}</div><div style="font-size:13px;color:#333;margin-top:2px">${m.text}</div></div><button class="icon-btn del" onclick="deleteMsg(${m.id})">🗑️</button></div>`;}).join("")}<button class="btn-red" onclick="clearMsgs()">🗑️ Alle berichten wissen</button>`;}
function deleteMsg(id){state.messages=state.messages.filter(m=>m.id!==id);renderAdminBody();}
function clearMsgs(){if(confirm("Alle berichten verwijderen?")){{state.messages=[];renderAdminBody();}}}
function renderAdminAgenda(){return`<div style="font-weight:bold;color:#6C3FC5;margin-bottom:12px;font-family:sans-serif">📅 Activiteiten</div>${state.events.map(ev=>`<div class="event-admin-row" style="border-left:4px solid ${ev.color}"><div style="flex:1"><div style="font-weight:bold;font-size:13px">${ev.title}</div><div style="font-size:11px;color:#aaa;font-family:sans-serif;margin-top:2px">${ev.date} · ${ev.time}</div></div><button class="icon-btn del" onclick="deleteEvent(${ev.id})">🗑️</button></div>`).join("")}<div class="add-member-box" style="margin-top:12px"><div style="font-size:13px;font-weight:bold;color:#27AE60;font-family:sans-serif;margin-bottom:10px">➕ Nieuwe activiteit</div><input class="field" id="ae-title" placeholder="Naam activiteit"/><div class="field-label">📅 Datum</div><input class="field" id="ae-date" type="date"/><div class="field-label">🕐 Tijd</div><input class="field" id="ae-time" type="time"/><input class="field" id="ae-who" placeholder="👥 Wie"/><button class="btn-green" onclick="addEventAdmin()">Toevoegen</button></div>`;}
function deleteEvent(id){state.events=state.events.filter(e=>e.id!==id);renderAdminBody();}
function addEventAdmin(){const t=document.getElementById("ae-title")?.value?.trim();const d=document.getElementById("ae-date")?.value;const ti=document.getElementById("ae-time")?.value;const w=document.getElementById("ae-who")?.value?.trim();if(!t)return;state.events.push({id:nid(state.events),title:t,date:fmtDate(d),time:fmtTime(ti),who:w||"Iedereen",color:"#1A6B8A"});renderAdminBody();}
function renderAdminNieuws(){return`<div style="font-weight:bold;color:#6C3FC5;margin-bottom:12px;font-family:sans-serif">📢 Nieuws</div>${state.news.map((item,i)=>`<div class="news-admin-row"><div style="flex:1;font-size:13px">${item}</div><button class="icon-btn del" onclick="deleteNews(${i})">🗑️</button></div>`).join("")}<div class="news-input-row"><input class="news-input" id="news-inp" placeholder="Nieuw bericht..." value="${newNews}"/><button onclick="addNews()" style="background:linear-gradient(135deg,#1A6B8A,#2E9EC4);color:#fff;border:none;border-radius:12px;padding:0 16px;cursor:pointer;font-weight:bold;font-size:18px">+</button></div>`;}
function deleteNews(i){state.news.splice(i,1);renderAdminBody();}
function addNews(){const v=document.getElementById("news-inp")?.value?.trim();if(!v)return;state.news.push(v);newNews="";renderAdminBody();}
renderHeader();
renderContent();
</script>
</body>
</html>
